naftiko: 1.0.0-alpha2
info:
  label: Phrase Strings API Reference — ICU
  description: 'Phrase Strings API Reference — ICU. 1 operations. Lead operation: Build ICU skeletons. Self-contained Naftiko
    capability covering one Phrase business surface.'
  tags:
  - Phrase
  - ICU
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PHRASE_API_KEY: PHRASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: strings-icu
    baseUri: https://api.phrase.com/v2
    description: Phrase Strings API Reference — ICU business capability. Self-contained, no shared references.
    resources:
    - name: icu-skeleton
      path: /icu/skeleton
      operations:
      - name: icuskeleton
        method: POST
        description: Build ICU skeletons
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PHRASE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: strings-icu-rest
    port: 8080
    description: REST adapter for Phrase Strings API Reference — ICU. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/icu/skeleton
      name: icu-skeleton
      description: REST surface for icu-skeleton.
      operations:
      - method: POST
        name: icuskeleton
        description: Build ICU skeletons
        call: strings-icu.icuskeleton
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: strings-icu-mcp
    port: 9090
    transport: http
    description: MCP adapter for Phrase Strings API Reference — ICU. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: build-icu-skeletons
      description: Build ICU skeletons
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: strings-icu.icuskeleton
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
