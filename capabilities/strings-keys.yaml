          type: object
          value: $.
        inputParameters:
        - name: branch
          in: query
          type: string
          description: specify the branch to use
        - name: sort
          in: query
          type: string
          description: 'Sort by field. Can be one of: name, created_at, updated_at.'
        - name: order
          in: query
          type: string
          description: 'Order direction. Can be one of: asc, desc.'
        - name: locale_id
          in: query
          type: string
          description: Locale used to determine the translation state of a key when filtering for untranslated or translated
            keys.
      - name: keycreate
        method: POST
        description: Create a key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
