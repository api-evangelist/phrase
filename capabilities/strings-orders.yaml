    namespace: strings-orders
    baseUri: https://api.phrase.com/v2
    description: Phrase Strings API Reference — Orders business capability. Self-contained, no shared references.
    resources:
    - name: projects-project_id-orders
      path: /projects/{project_id}/orders
      operations:
      - name: orderslist
        method: GET
        description: List orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: branch
          in: query
          type: string
          description: specify the branch to use
      - name: ordercreate
        method: POST
        description: Create a new order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-project_id-orders-id
      path: /projects/{project_id}/orders/{id}
      operations:
      - name: ordershow
        method: GET
        description: Get a single order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: branch
          in: query
          type: string
          description: specify the branch to use
      - name: orderdelete
        method: DELETE
        description: Cancel an order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: branch
          in: query
          type: string
          description: specify the branch to use
    - name: projects-project_id-orders-id-confirm
      path: /projects/{project_id}/orders/{id}/confirm
      operations:
      - name: orderconfirm
        method: PATCH
        description: Confirm an order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PHRASE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: strings-orders-rest
    port: 8080
    description: REST adapter for Phrase Strings API Reference — Orders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects/{project-id}/orders
      name: projects-project-id-orders
      description: REST surface for projects-project_id-orders.
      operations:
      - method: GET
        name: orderslist
        description: List orders
        call: strings-orders.orderslist
        with:
          branch: rest.branch
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: ordercreate
        description: Create a new order
        call: strings-orders.ordercreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{project-id}/orders/{id}
      name: projects-project-id-orders-id
      description: REST surface for projects-project_id-orders-id.
      operations:
      - method: GET
        name: ordershow
        description: Get a single order
        call: strings-orders.ordershow
        with:
          branch: rest.branch
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: orderdelete
        description: Cancel an order
        call: strings-orders.orderdelete
        with:
          branch: rest.branch
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{project-id}/orders/{id}/confirm
      name: projects-project-id-orders-id-confirm
      description: REST surface for projects-project_id-orders-id-confirm.
      operations:
      - method: PATCH
        name: orderconfirm
        description: Confirm an order
        call: strings-orders.orderconfirm
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
