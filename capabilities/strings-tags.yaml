naftiko: 1.0.0-alpha2
info:
  label: Phrase Strings API Reference — Tags
  description: 'Phrase Strings API Reference — Tags. 4 operations. Lead operation: List tags. Self-contained Naftiko capability
    covering one Phrase business surface.'
  tags:
  - Phrase
  - Tags
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PHRASE_API_KEY: PHRASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: strings-tags
    baseUri: https://api.phrase.com/v2
    description: Phrase Strings API Reference — Tags business capability. Self-contained, no shared references.
    resources:
    - name: projects-project_id-tags
      path: /projects/{project_id}/tags
      operations:
      - name: tagslist
        method: GET
        description: List tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: exclude_system_tags
          in: query
          type: boolean
          description: excludes tags generated by the system, e.g. job, upload or figma tags
        - name: branch
          in: query
          type: string
          description: specify the branch to use
      - name: tagcreate
        method: POST
        description: Create a tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-project_id-tags-name
      path: /projects/{project_id}/tags/{name}
      operations:
      - name: tagshow
        method: GET
        description: Get a single tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: omit_statistics
          in: query
          type: boolean
          description: omit statistics in the response
        - name: branch
          in: query
          type: string
          description: specify the branch to use
      - name: tagdelete
        method: DELETE
        description: Delete a tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: branch
          in: query
          type: string
          description: specify the branch to use
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.PHRASE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: strings-tags-rest
    port: 8080
    description: REST adapter for Phrase Strings API Reference — Tags. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects/{project-id}/tags
      name: projects-project-id-tags
      description: REST surface for projects-project_id-tags.
      operations:
      - method: GET
        name: tagslist
        description: List tags
        call: strings-tags.tagslist
        with:
          exclude_system_tags: rest.exclude_system_tags
          branch: rest.branch
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: tagcreate
        description: Create a tag
        call: strings-tags.tagcreate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{project-id}/tags/{name}
      name: projects-project-id-tags-name
      description: REST surface for projects-project_id-tags-name.
      operations:
      - method: GET
        name: tagshow
        description: Get a single tag
        call: strings-tags.tagshow
        with:
          omit_statistics: rest.omit_statistics
          branch: rest.branch
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: tagdelete
        description: Delete a tag
        call: strings-tags.tagdelete
        with:
          branch: rest.branch
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: strings-tags-mcp
    port: 9090
    transport: http
    description: MCP adapter for Phrase Strings API Reference — Tags. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-tags
      description: List tags
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: strings-tags.tagslist
      with:
        exclude_system_tags: tools.exclude_system_tags
        branch: tools.branch
      outputParameters:
      - type: object
        mapping: $.
    - name: create-tag
      description: Create a tag
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: strings-tags.tagcreate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-single-tag
      description: Get a single tag
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: strings-tags.tagshow
      with:
        omit_statistics: tools.omit_statistics
        branch: tools.branch
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-tag
      description: Delete a tag
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: strings-tags.tagdelete
      with:
        branch: tools.branch
      outputParameters:
      - type: object
        mapping: $.
