  id: ID!
  message: String!
  key: Key!
  user: User
  unread: Boolean
  createdAt: String!
  updatedAt: String!
  replies: [CommentReply!]!
  reactions: [CommentReaction!]!
}

type CommentReply {
  id: ID!
  message: String!
  comment: Comment!
