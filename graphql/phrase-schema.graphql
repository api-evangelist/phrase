# ─── Enums ────────────────────────────────────────────────────────────────────

enum KeyDataType {
  string
  number
  boolean
  array
  xml
}

enum JobState {
  draft
  in_progress
  completed
  cancelled
}

enum JobLocaleState {
  queued
  in_progress
  completed
}

enum MemberRole {
  admin
  project_manager
  developer
  designer
  translator
  guest
}

enum InvitationState {
  pending
  accepted
  expired
  declined
}

enum OrderState {
  new
  pending
  in_progress
  ready
  cancelled
}

enum UploadState {
  waiting
  processing
  success
  failure
}

enum CustomMetadataDataType {
  string
  number
  boolean
  list
}

