  caseSensitive: Boolean!
  doNotTranslate: Boolean!
  glossary: Glossary!
  translations: [GlossaryTermTranslation!]!
  createdAt: String!
  updatedAt: String!
}

type GlossaryTermTranslation {
  id: ID!
  localeCode: String!
  content: String!
  caseSensitive: Boolean
  doNotTranslate: Boolean
  term: GlossaryTerm!
  createdAt: String!
  updatedAt: String!
}

type Webhook {
  id: ID!
