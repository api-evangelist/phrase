  height: Int
}

type StyleGuide {
  id: ID!
  title: String!
  audience: String
  targetAudience: String
  businessGoal: String
  toneAndPersonality: String
  vocabulary: String
  validationEndpoint: String
  project: Project!
  createdAt: String!
  updatedAt: String!
}

type Tag {
  id: ID!
  name: String!
  keyCount: Int
  project: Project!
  createdAt: String!
  updatedAt: String!
}

type Team {
  id: ID!
  name: String!
  account: Account!
  members: [Member!]!
  projects: [Project!]!
  spaces: [Space!]!
  createdAt: String!
  updatedAt: String!
}

type Space {
  id: ID!
